<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8c00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="#0a0e1a"/>
  <circle cx="16" cy="16" r="8" fill="url(#grad)" filter="url(#glow)"/>
  <circle cx="16" cy="16" r="11" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.7"/>
  <circle cx="16" cy="16" r="13" fill="none" stroke="#00ffff" stroke-width="0.5" opacity="0.4"/>
</svg>
